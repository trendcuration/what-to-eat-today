<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>오늘 뭐먹지? 🍽️</title>
  <meta name="description" content="오늘 뭐 먹을지 고민될 때! 랜덤으로 메뉴를 골라드려요." />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  <style>
    /* ===== CSS Variables ===== */
    :root {
      --primary: #3182F6;
      --primary-light: #EBF3FE;
      --primary-dark: #1A6FF8;
      --bg: #F9FAFB;
      --surface: #FFFFFF;
      --text: #191F28;
      --text-sub: #6B7684;
      --text-placeholder: #ADB5BD;
      --border: #E5E8EB;
      --tag-bg: #F2F4F6;
      --tag-text: #4E5968;
      --danger: #F04452;
      --success: #00B493;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-pill: 100px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 2px 8px rgba(0,0,0,0.04);
      --shadow-md: 0 2px 8px rgba(0,0,0,0.08), 0 8px 24px rgba(0,0,0,0.06);
      --shadow-btn: 0 4px 14px rgba(49,130,246,0.35);
      --font: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ===== Reset & Base ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      overflow-x: hidden;
    }
    button { cursor: pointer; border: none; background: none; font-family: inherit; }
    input { font-family: inherit; }
    a { color: inherit; text-decoration: none; }

    /* ===== Layout ===== */
    .app {
      max-width: 430px;
      margin: 0 auto;
      padding: 0 20px calc(32px + env(safe-area-inset-bottom));
      min-height: 100dvh;
    }

    /* ===== Header ===== */
    .header {
      padding: 40px 0 8px;
      text-align: center;
    }
    .header__emoji {
      font-size: 40px;
      line-height: 1;
      margin-bottom: 12px;
    }
    .header__title {
      font-size: 24px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.5px;
    }
    .header__subtitle {
      margin-top: 6px;
      font-size: 14px;
      color: var(--text-sub);
      font-weight: 400;
    }

    /* ===== Roulette Display ===== */
    .roulette-wrap {
      margin-top: 28px;
    }
    .roulette-display {
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      min-height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    .roulette-inner {
      font-size: 32px;
      font-weight: 800;
      color: var(--text-placeholder);
      letter-spacing: -0.5px;
      text-align: center;
      padding: 24px 20px;
      transition: color 0.3s;
      user-select: none;
    }
    .roulette-inner.is-spinning {
      color: var(--text);
    }
    .roulette-inner.is-result {
      color: var(--primary);
      font-size: 36px;
    }
    @keyframes slide-up {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slide-down {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .roulette-inner.anim-up {
      animation: slide-up 0.12s ease-out forwards;
    }
    .roulette-inner.anim-down {
      animation: slide-down 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    /* ===== Pick Button ===== */
    .pick-btn {
      margin-top: 16px;
      width: 100%;
      height: 56px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-btn);
      letter-spacing: -0.3px;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      position: relative;
      overflow: hidden;
    }
    .pick-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      pointer-events: none;
    }
    .pick-btn:active:not(:disabled) {
      transform: scale(0.97);
      box-shadow: 0 2px 8px rgba(49,130,246,0.25);
    }
    .pick-btn:disabled {
      background: linear-gradient(135deg, #ADB5BD, #8E99A4);
      box-shadow: none;
      cursor: not-allowed;
    }
    .pick-btn.spinning {
      background: linear-gradient(135deg, #6B7684, #4E5968);
      box-shadow: none;
      cursor: not-allowed;
    }

    /* ===== Input Section ===== */
    .input-section {
      margin-top: 24px;
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 16px;
      box-shadow: var(--shadow-sm);
    }
    .input-section__label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-sub);
      margin-bottom: 10px;
      letter-spacing: 0.1px;
    }
    .input-row {
      display: flex;
      gap: 8px;
    }
    .menu-input {
      flex: 1;
      height: 44px;
      padding: 0 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 16px; /* prevent iOS auto-zoom */
      font-weight: 500;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color var(--transition);
    }
    .menu-input::placeholder { color: var(--text-placeholder); }
    .menu-input:focus { border-color: var(--primary); }
    .add-btn {
      height: 44px;
      padding: 0 18px;
      background: var(--primary);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      border-radius: var(--radius-md);
      white-space: nowrap;
      transition: background var(--transition), transform 0.1s;
    }
    .add-btn:active { transform: scale(0.95); }

    /* ===== Tags Section ===== */
    .tags-section {
      margin-top: 12px;
    }
    .tags-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      padding: 0 2px;
    }
    .tags-count {
      font-size: 13px;
      color: var(--text-sub);
      font-weight: 500;
    }
    .tags-clear {
      font-size: 13px;
      color: var(--text-sub);
      padding: 2px 6px;
      border-radius: var(--radius-sm);
      transition: color var(--transition), background var(--transition);
    }
    .tags-clear:hover { color: var(--danger); background: #FEF2F2; }
    .tags-container {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 10px 6px 12px;
      background: var(--tag-bg);
      border-radius: var(--radius-pill);
      font-size: 14px;
      font-weight: 500;
      color: var(--tag-text);
      animation: tag-in 0.2s ease-out;
    }
    @keyframes tag-in {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }
    .tag__delete {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-placeholder);
      font-size: 14px;
      line-height: 1;
      transition: color var(--transition), background var(--transition);
      flex-shrink: 0;
    }
    .tag__delete:hover { color: var(--danger); background: rgba(240,68,82,0.1); }

    .tags-empty {
      font-size: 14px;
      color: var(--text-placeholder);
      padding: 4px 2px;
    }

    /* ===== Min menus hint ===== */
    .pick-hint {
      margin-top: 8px;
      text-align: center;
      font-size: 13px;
      color: var(--text-placeholder);
      min-height: 20px;
    }

    /* ===== Result Section ===== */
    .result-section {
      display: none;
      margin-top: 20px;
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 28px 20px 24px;
      box-shadow: var(--shadow-md);
      text-align: center;
      flex-direction: column;
      align-items: center;
    }
    .result-section.visible {
      display: flex;
      animation: result-pop 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    @keyframes result-pop {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }
    .result-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-sub);
      letter-spacing: 0.5px;
    }
    .result-text {
      margin-top: 10px;
      font-size: 38px;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: -1px;
      line-height: 1.2;
      word-break: keep-all;
    }
    .result-actions {
      margin-top: 20px;
      display: flex;
      gap: 8px;
      width: 100%;
    }
    .retry-btn {
      flex: 1;
      height: 44px;
      background: var(--tag-bg);
      color: var(--tag-text);
      font-size: 15px;
      font-weight: 600;
      border-radius: var(--radius-md);
      transition: background var(--transition), transform 0.1s;
    }
    .retry-btn:active { transform: scale(0.97); }
    .share-btn {
      flex: 1;
      height: 44px;
      background: var(--primary-light);
      color: var(--primary);
      font-size: 15px;
      font-weight: 700;
      border-radius: var(--radius-md);
      transition: background var(--transition), transform 0.1s;
    }
    .share-btn:active { transform: scale(0.97); }

    /* ===== Bottom Sheet ===== */
    .sheet-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
    }
    .sheet-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }
    .sheet {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%) translateY(100%);
      width: 100%;
      max-width: 430px;
      background: var(--surface);
      border-radius: 24px 24px 0 0;
      padding: 16px 20px calc(24px + env(safe-area-inset-bottom));
      z-index: 101;
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    }
    .sheet.open {
      transform: translateX(-50%) translateY(0);
    }
    .sheet__handle {
      width: 36px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 20px;
    }
    .sheet__title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 16px;
    }
    .sheet__btn {
      width: 100%;
      height: 52px;
      border-radius: var(--radius-md);
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 18px;
      transition: background var(--transition), transform 0.1s;
      margin-bottom: 8px;
    }
    .sheet__btn:active { transform: scale(0.98); }
    .sheet__btn--copy {
      background: var(--tag-bg);
      color: var(--tag-text);
    }
    .sheet__btn--kakao {
      background: #FEE500;
      color: #191919;
    }
    .sheet__btn--share {
      background: var(--primary-light);
      color: var(--primary);
    }
    .sheet__btn--cancel {
      background: none;
      color: var(--text-sub);
      margin-top: 4px;
      justify-content: center;
    }
    .sheet__btn-icon { font-size: 20px; }

    /* ===== Toast ===== */
    .toast {
      position: fixed;
      bottom: calc(32px + env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: rgba(25,31,40,0.9);
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      padding: 10px 20px;
      border-radius: var(--radius-pill);
      z-index: 200;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ===== Confetti Canvas ===== */
    #confetti-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 300;
    }

    /* ===== Desktop ===== */
    @media (min-width: 768px) {
      .app {
        padding-top: 20px;
      }
      .header {
        padding-top: 48px;
      }
      .pick-btn {
        height: 60px;
        font-size: 19px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header__emoji">🍽️</div>
      <h1 class="header__title">오늘 뭐먹지?</h1>
      <p class="header__subtitle">메뉴를 추가하고 골라줘! 버튼을 눌러보세요</p>
    </header>

    <!-- Roulette Display -->
    <div class="roulette-wrap">
      <div class="roulette-display" id="rouletteDisplay">
        <div class="roulette-inner" id="rouletteInner">메뉴를 추가해주세요</div>
      </div>
      <button class="pick-btn" id="pickBtn" disabled>골라줘! 🎲</button>
      <p class="pick-hint" id="pickHint">메뉴를 2개 이상 추가해주세요</p>
    </div>

    <!-- Input Section -->
    <div class="input-section">
      <p class="input-section__label">메뉴 추가</p>
      <div class="input-row">
        <input
          class="menu-input"
          id="menuInput"
          type="text"
          placeholder="ex) 삼겹살, 치킨, 피자..."
          maxlength="20"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
        />
        <button class="add-btn" id="addBtn">추가</button>
      </div>
    </div>

    <!-- Tags Section -->
    <div class="tags-section">
      <div class="tags-header">
        <span class="tags-count" id="tagsCount">0개</span>
        <button class="tags-clear" id="clearBtn">전체 삭제</button>
      </div>
      <div class="tags-container" id="tagsContainer">
        <span class="tags-empty">아직 추가된 메뉴가 없어요</span>
      </div>
    </div>

    <!-- Result Section -->
    <div class="result-section" id="resultSection">
      <p class="result-label">오늘은 이걸로 결정!</p>
      <p class="result-text" id="resultText"></p>
      <div class="result-actions">
        <button class="retry-btn" id="retryBtn">다시 골라줘</button>
        <button class="share-btn" id="shareBtn">공유하기 🔗</button>
      </div>
    </div>
  </div>

  <!-- Bottom Sheet Overlay -->
  <div class="sheet-overlay" id="sheetOverlay"></div>

  <!-- Share Bottom Sheet -->
  <div class="sheet" id="shareSheet">
    <div class="sheet__handle"></div>
    <p class="sheet__title">공유하기</p>
    <button class="sheet__btn sheet__btn--copy" id="copyLinkBtn">
      <span class="sheet__btn-icon">🔗</span>링크 복사하기
    </button>
    <button class="sheet__btn sheet__btn--kakao" id="kakaoBtn" style="display:none;">
      <span class="sheet__btn-icon">💬</span>카카오톡으로 공유
    </button>
    <button class="sheet__btn sheet__btn--share" id="nativeShareBtn" style="display:none;">
      <span class="sheet__btn-icon">📤</span>공유하기
    </button>
    <button class="sheet__btn sheet__btn--cancel" id="cancelSheetBtn">취소</button>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Confetti Canvas -->
  <canvas id="confetti-canvas"></canvas>

  <script>
    /* ===== Constants ===== */
    const STORAGE_KEY = 'wte_menus_v1';
    const MAX_MENUS = 30;

    const DEFAULT_MENUS = [
      '김치찌개', '된장찌개', '순두부찌개',
      '삼겹살', '치킨', '피자',
      '짜장면', '짬뽕', '떡볶이',
      '라면', '초밥', '파스타',
      '햄버거', '비빔밥', '냉면', '불고기',
    ];

    const ROULETTE_PHASES = [
      { count: 8,  interval: 60  },
      { count: 6,  interval: 100 },
      { count: 5,  interval: 150 },
      { count: 4,  interval: 220 },
      { count: 3,  interval: 320 },
      { count: 2,  interval: 450 },
      { count: 2,  interval: 620 },
      { count: 1,  interval: 850 },
    ];

    const CONFETTI_COLORS = ['#3182F6', '#FF6B35', '#FFD93D', '#6BCB77', '#FF6B9D', '#C77DFF', '#00B493'];

    /* ===== State ===== */
    const state = {
      menus: [],
      isSpinning: false,
      result: null,
    };

    /* ===== DOM References ===== */
    const $ = id => document.getElementById(id);
    const dom = {
      rouletteInner: $('rouletteInner'),
      pickBtn:        $('pickBtn'),
      pickHint:       $('pickHint'),
      menuInput:      $('menuInput'),
      addBtn:         $('addBtn'),
      tagsContainer:  $('tagsContainer'),
      tagsCount:      $('tagsCount'),
      clearBtn:       $('clearBtn'),
      resultSection:  $('resultSection'),
      resultText:     $('resultText'),
      retryBtn:       $('retryBtn'),
      shareBtn:       $('shareBtn'),
      sheetOverlay:   $('sheetOverlay'),
      shareSheet:     $('shareSheet'),
      copyLinkBtn:    $('copyLinkBtn'),
      kakaoBtn:       $('kakaoBtn'),
      nativeShareBtn: $('nativeShareBtn'),
      cancelSheetBtn: $('cancelSheetBtn'),
      toast:          $('toast'),
      canvas:         $('confetti-canvas'),
    };

    /* ===== Storage ===== */
    const Storage = {
      load() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return null;
          const parsed = JSON.parse(raw);
          return Array.isArray(parsed) ? parsed.filter(m => typeof m === 'string' && m.trim()) : null;
        } catch { return null; }
      },
      save(menus) {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(menus)); } catch {}
      },
    };

    /* ===== Menu Manager ===== */
    const MenuManager = {
      add(raw) {
        const name = raw.trim();
        if (!name) return false;
        if (state.menus.length >= MAX_MENUS) {
          Toast.show(`최대 ${MAX_MENUS}개까지 추가할 수 있어요`);
          return false;
        }
        const lower = name.toLowerCase();
        if (state.menus.some(m => m.toLowerCase() === lower)) {
          Toast.show('이미 추가된 메뉴예요');
          return false;
        }
        state.menus.push(name);
        Storage.save(state.menus);
        this.render();
        return true;
      },
      remove(name) {
        state.menus = state.menus.filter(m => m !== name);
        Storage.save(state.menus);
        this.render();
      },
      clear() {
        state.menus = [];
        Storage.save(state.menus);
        this.render();
      },
      render() {
        const container = dom.tagsContainer;
        container.innerHTML = '';
        if (state.menus.length === 0) {
          container.innerHTML = '<span class="tags-empty">아직 추가된 메뉴가 없어요</span>';
        } else {
          state.menus.forEach(name => {
            const tag = document.createElement('span');
            tag.className = 'tag';
            tag.innerHTML = `<span class="tag__name">${escHtml(name)}</span><button class="tag__delete" aria-label="${escHtml(name)} 삭제">✕</button>`;
            tag.querySelector('.tag__delete').addEventListener('click', () => MenuManager.remove(name));
            container.appendChild(tag);
          });
        }
        const count = state.menus.length;
        dom.tagsCount.textContent = `${count}개`;
        dom.clearBtn.style.display = count > 0 ? '' : 'none';

        // Update pick button state
        const canPick = count >= 2 && !state.isSpinning;
        dom.pickBtn.disabled = !canPick;
        dom.pickHint.textContent = count < 2 ? '메뉴를 2개 이상 추가해주세요' : '';
        dom.pickHint.style.opacity = count < 2 ? '1' : '0';

        // Update roulette placeholder
        if (!state.isSpinning && !state.result) {
          dom.rouletteInner.textContent = count === 0
            ? '메뉴를 추가해주세요'
            : count === 1
              ? '메뉴를 하나 더 추가해주세요'
              : '골라줘! 버튼을 눌러보세요';
          dom.rouletteInner.className = 'roulette-inner';
        }
      },
    };

    /* ===== Roulette ===== */
    const Roulette = {
      _prevShown: null,

      start() {
        if (state.isSpinning || state.menus.length < 2) return;
        state.isSpinning = true;
        state.result = null;
        dom.pickBtn.disabled = true;
        dom.pickBtn.classList.add('spinning');
        dom.pickBtn.textContent = '고르는 중...';
        dom.resultSection.classList.remove('visible');
        dom.resultSection.style.display = 'none';
        dom.rouletteInner.className = 'roulette-inner is-spinning';

        // Pick winner before animation
        const winner = state.menus[Math.floor(Math.random() * state.menus.length)];
        this._prevShown = null;

        this._runPhases(ROULETTE_PHASES, 0, 0, winner);
      },

      _runPhases(phases, phaseIdx, stepIdx, winner) {
        if (phaseIdx >= phases.length) {
          // Final: show winner with slide-down
          this._showItem(winner, 'anim-down');
          setTimeout(() => this._finish(winner), 400);
          return;
        }

        const phase = phases[phaseIdx];
        const item = this._pickRandom();
        this._showItem(item, 'anim-up');

        const nextPhase = stepIdx + 1 >= phase.count ? phaseIdx + 1 : phaseIdx;
        const nextStep  = stepIdx + 1 >= phase.count ? 0 : stepIdx + 1;

        setTimeout(() => this._runPhases(phases, nextPhase, nextStep, winner), phase.interval);
      },

      _pickRandom() {
        const pool = state.menus.length > 1
          ? state.menus.filter(m => m !== this._prevShown)
          : state.menus;
        const chosen = pool[Math.floor(Math.random() * pool.length)];
        this._prevShown = chosen;
        return chosen;
      },

      _showItem(name, animClass) {
        const el = dom.rouletteInner;
        el.classList.remove('anim-up', 'anim-down');
        void el.offsetWidth; // force reflow
        el.textContent = name;
        el.classList.add(animClass);
      },

      _finish(winner) {
        state.isSpinning = false;
        state.result = winner;

        dom.pickBtn.disabled = false;
        dom.pickBtn.classList.remove('spinning');
        dom.pickBtn.textContent = '다시 골라줘! 🎲';
        dom.pickHint.style.opacity = '0';

        dom.rouletteInner.className = 'roulette-inner is-result';

        dom.resultText.textContent = winner;
        dom.resultSection.classList.add('visible');

        Confetti.burst();
      },
    };

    /* ===== Confetti ===== */
    const Confetti = {
      particles: [],
      rafId: null,
      _safetyTimer: null,

      burst() {
        cancelAnimationFrame(this.rafId);
        clearTimeout(this._safetyTimer);
        this._resize();
        this.particles = this._create(110);
        this._animate();
        this._safetyTimer = setTimeout(() => this._stop(), 5000);
      },

      _create(n) {
        const cx = dom.canvas.width / 2;
        const particles = [];
        for (let i = 0; i < n; i++) {
          const angle = (Math.random() * 360) * Math.PI / 180;
          const speed = 4 + Math.random() * 8;
          particles.push({
            x: cx + (Math.random() - 0.5) * 60,
            y: dom.canvas.height * 0.38,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - (5 + Math.random() * 4),
            color: CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)],
            shape: Math.random() < 0.6 ? 'rect' : 'circle',
            w: 6 + Math.random() * 6,
            h: 3 + Math.random() * 4,
            r: 3 + Math.random() * 4,
            rotation: Math.random() * 360,
            rotSpeed: (Math.random() - 0.5) * 8,
            opacity: 1,
            gravity: 0.22 + Math.random() * 0.1,
          });
        }
        return particles;
      },

      _animate() {
        const canvas = dom.canvas;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        this.particles.forEach(p => {
          p.vy += p.gravity;
          p.vx *= 0.99;
          p.x += p.vx;
          p.y += p.vy;
          p.rotation += p.rotSpeed;
          if (p.y > canvas.height * 0.6) p.opacity -= 0.016;

          if (p.opacity <= 0) return;
          ctx.save();
          ctx.globalAlpha = Math.max(0, p.opacity);
          ctx.fillStyle = p.color;
          ctx.translate(p.x, p.y);
          ctx.rotate(p.rotation * Math.PI / 180);
          if (p.shape === 'rect') {
            ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
          } else {
            ctx.beginPath();
            ctx.arc(0, 0, p.r, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.restore();
        });

        this.particles = this.particles.filter(p => p.opacity > 0 && p.y < canvas.height + 40);

        if (this.particles.length > 0) {
          this.rafId = requestAnimationFrame(() => this._animate());
        } else {
          this._stop();
        }
      },

      _stop() {
        cancelAnimationFrame(this.rafId);
        clearTimeout(this._safetyTimer);
        const ctx = dom.canvas.getContext('2d');
        ctx.clearRect(0, 0, dom.canvas.width, dom.canvas.height);
        this.particles = [];
      },

      _resize() {
        dom.canvas.width  = window.innerWidth;
        dom.canvas.height = window.innerHeight;
      },
    };

    /* ===== Share ===== */
    const Share = {
      buildURL() {
        const base = location.origin + location.pathname;
        const params = new URLSearchParams({ menus: state.menus.join(',') });
        return `${base}?${params}`;
      },

      async copyLink() {
        const url = this.buildURL();
        try {
          await navigator.clipboard.writeText(url);
          Toast.show('링크가 복사되었어요! 📋');
        } catch {
          this._clipboardFallback(url);
        }
        this.closeSheet();
      },

      _clipboardFallback(text) {
        const el = document.createElement('textarea');
        el.value = text;
        el.style.cssText = 'position:fixed;top:-9999px;left:-9999px;';
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        Toast.show('링크가 복사되었어요! 📋');
      },

      async native() {
        const url = this.buildURL();
        try {
          await navigator.share({
            title: '오늘 뭐먹지? 🍽️',
            text: state.result ? `오늘은 ${state.result} 어때요?` : '같이 오늘 메뉴 골라봐요!',
            url,
          });
        } catch (e) {
          if (e.name !== 'AbortError') this._clipboardFallback(url);
        }
        this.closeSheet();
      },

      openSheet() {
        dom.sheetOverlay.classList.add('open');
        dom.shareSheet.classList.add('open');
        const hasNativeShare = !!navigator.share;
        dom.nativeShareBtn.style.display = hasNativeShare ? '' : 'none';
      },

      closeSheet() {
        dom.sheetOverlay.classList.remove('open');
        dom.shareSheet.classList.remove('open');
      },

      loadFromURL() {
        const params = new URLSearchParams(location.search);
        const raw = params.get('menus');
        if (!raw) return;
        const imported = raw.split(',')
          .map(s => s.trim())
          .filter(s => s.length > 0 && s.length <= 20)
          .slice(0, MAX_MENUS);
        if (imported.length > 0) {
          state.menus = imported;
          Storage.save(state.menus);
          Toast.show('공유받은 메뉴 목록을 불러왔어요!');
        }
      },
    };

    /* ===== Toast ===== */
    const Toast = {
      _timer: null,
      show(msg, duration = 2200) {
        clearTimeout(this._timer);
        dom.toast.textContent = msg;
        dom.toast.classList.add('show');
        this._timer = setTimeout(() => dom.toast.classList.remove('show'), duration);
      },
    };

    /* ===== Utilities ===== */
    function escHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    /* ===== Event Wiring ===== */
    function wireEvents() {
      // Input add
      dom.addBtn.addEventListener('click', () => {
        if (MenuManager.add(dom.menuInput.value)) {
          dom.menuInput.value = '';
          dom.menuInput.focus();
        }
      });
      dom.menuInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') dom.addBtn.click();
      });

      // Pick
      dom.pickBtn.addEventListener('click', () => Roulette.start());

      // Retry from result
      dom.retryBtn.addEventListener('click', () => {
        state.result = null;
        dom.resultSection.classList.remove('visible');
        dom.resultSection.style.display = 'none';
        dom.rouletteInner.className = 'roulette-inner';
        dom.pickBtn.textContent = '골라줘! 🎲';
        MenuManager.render();
      });

      // Clear all
      dom.clearBtn.addEventListener('click', () => {
        if (state.menus.length === 0) return;
        if (confirm('메뉴를 모두 삭제할까요?')) {
          MenuManager.clear();
          state.result = null;
          dom.resultSection.classList.remove('visible');
          dom.resultSection.style.display = 'none';
          dom.pickBtn.textContent = '골라줘! 🎲';
        }
      });

      // Share sheet
      dom.shareBtn.addEventListener('click', () => Share.openSheet());
      dom.sheetOverlay.addEventListener('click', () => Share.closeSheet());
      dom.cancelSheetBtn.addEventListener('click', () => Share.closeSheet());
      dom.copyLinkBtn.addEventListener('click', () => Share.copyLink());
      dom.nativeShareBtn.addEventListener('click', () => Share.native());
      dom.kakaoBtn.addEventListener('click', () => Share.closeSheet());

      // Resize confetti canvas
      window.addEventListener('resize', () => {
        if (Confetti.particles.length > 0) Confetti._resize();
      });
    }

    /* ===== Init ===== */
    function init() {
      Confetti._resize();

      // Load from URL first (shared link takes priority)
      Share.loadFromURL();

      // If URL didn't populate, load from storage or use defaults
      if (state.menus.length === 0) {
        const saved = Storage.load();
        state.menus = (saved && saved.length > 0) ? saved : [...DEFAULT_MENUS];
        Storage.save(state.menus);
      }

      MenuManager.render();
      wireEvents();

      // Clean URL if menus param present (avoids stale shared URL confusion)
      if (location.search) {
        history.replaceState(null, '', location.pathname);
      }
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
